<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>원가계산기 · 현대컨테이너</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0f1e;color:#e2e8f0;font-family:'IBM Plex Mono',monospace;min-height:100vh}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:#0a0f1e}
  ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  .size-btn{background:transparent;border:1px solid #1e3a5f;color:#64748b;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
  .size-btn:hover{border-color:#f97316;color:#f97316}
  .size-btn.active{background:#f97316;border-color:#f97316;color:#fff;font-weight:600}
  .tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:#475569;padding:8px 20px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
  .tab-btn.active{border-color:#f97316;color:#f97316}
  .row-hover:hover{background:rgba(249,115,22,0.04)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{font-weight:400;color:#475569;padding:7px 12px}
  td{padding:5px 12px;border-bottom:1px solid #0f1f35;color:#94a3b8}
  input{background:transparent;border:none;border-bottom:1px solid #334155;color:#f1f5f9;font-size:13px;text-align:right;outline:none;font-family:inherit;width:100%;padding:2px 4px}
  input:focus{border-color:#f97316}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://tssndwlbeogehtfinqek.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzc25kd2xiZW9nZWh0ZmlucWVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDI4MzMsImV4cCI6MjA4MjY3ODgzM30.1Op9V2bWQaysLh1H1Df4eo_l0qt0QHoz6eZu4PBwCTo";

const SIZES = ["3*3","3*4","3*5","3*6","3*7","3*8","3*9","3*10","3*11","3*12"];
const CAT_LABELS = {steel:"철골 자재", interior:"내장 자재", paint_material:"페인트 자재"};
const CAT_COLORS = {steel:"#f97316", interior:"#22d3ee", paint_material:"#a78bfa"};
const LABOR_COLORS = {철골:"#f97316", 내장:"#22d3ee", 페인트:"#a78bfa"};

async function sbFetch(table, query="") {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    headers: {apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`}
  });
  return res.json();
}
async function sbPatch(table, filter, body) {
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    method:"PATCH",
    headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=minimal"},
    body:JSON.stringify(body)
  });
}

const fmt = n => Math.round(n||0).toLocaleString("ko-KR");

function App() {
  const [size, setSize] = useState("3*9");
  const [allItems, setAllItems] = useState([]);
  const [allLabor, setAllLabor] = useState([]);
  const [rows, setRows] = useState([]);
  const [laborRows, setLaborRows] = useState([]);
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState("calc");
  const [savedId, setSavedId] = useState(null);

  useEffect(() => {
    (async () => {
      const [items, labor] = await Promise.all([
        sbFetch("cost_items","?select=*&is_active=eq.true&order=category,id"),
        sbFetch("cost_base_labor","?select=*&order=category,container_size"),
      ]);
      setAllItems(items||[]);
      setAllLabor(labor||[]);
    })();
  }, []);

  const loadPresets = useCallback(async (sel) => {
    if(!allItems.length) return;
    setLoading(true);
    const presets = await sbFetch("cost_presets", `?select=item_id,default_qty&container_size=eq.${encodeURIComponent(sel)}`);
    const map = {};
    (presets||[]).forEach(p => { map[p.item_id] = p.default_qty; });
    setRows(allItems.map(item => ({...item, qty: map[item.id] ?? 0})));
    setLaborRows((allLabor||[]).filter(l => l.container_size === sel).map(l => ({...l})));
    setLoading(false);
  }, [allItems, allLabor]);

  useEffect(() => { if(allItems.length) loadPresets(size); }, [size, allItems]);

  const updateQty = (id, val) => setRows(r => r.map(row => row.id===id ? {...row, qty:parseFloat(val)||0} : row));

  const updatePrice = async (id, val) => {
    const price = parseInt(val)||0;
    setRows(r => r.map(row => row.id===id ? {...row, unit_price:price} : row));
    setAllItems(a => a.map(item => item.id===id ? {...item, unit_price:price} : item));
    await sbPatch("cost_items", `id=eq.${id}`, {unit_price:price, updated_at:new Date().toISOString()});
    setSavedId(id);
    setTimeout(()=>setSavedId(null), 1500);
  };

  const updateLabor = async (id, val) => {
    const cost = parseInt(val)||0;
    setLaborRows(l => l.map(r => r.id===id ? {...r, base_cost:cost} : r));
    setAllLabor(a => a.map(r => r.id===id ? {...r, base_cost:cost} : r));
    await sbPatch("cost_base_labor", `id=eq.${id}`, {base_cost:cost});
    setSavedId("labor_"+id);
    setTimeout(()=>setSavedId(null), 1500);
  };

  const byCategory = {};
  rows.forEach(row => {
    if(!byCategory[row.category]) byCategory[row.category]=[];
    byCategory[row.category].push(row);
  });

  const matTotal = rows.reduce((s,r)=>s+r.qty*r.unit_price, 0);
  const laborTotal = laborRows.reduce((s,r)=>s+r.base_cost, 0);
  const grandTotal = matTotal + laborTotal;

  return (
    <div>
      {/* 헤더 */}
      <div style={{borderBottom:"1px solid #1e3a5f",padding:"18px 28px",display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:22,color:"#f97316",letterSpacing:2}}>원가계산기</div>
        <div style={{fontSize:11,color:"#334155"}}>현대컨테이너 · COST CALCULATOR</div>
        <div style={{marginLeft:"auto",fontSize:11,color:"#22d3ee",opacity:savedId?1:0,transition:"opacity .3s"}}>✓ 저장됨</div>
      </div>

      <div style={{padding:"24px 28px"}}>
        {/* 규격 선택 */}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:11,color:"#475569",marginBottom:10,letterSpacing:2}}>CONTAINER SIZE</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {SIZES.map(s => (
              <button key={s} className={`size-btn${size===s?" active":""}`} onClick={()=>setSize(s)}>{s}</button>
            ))}
          </div>
        </div>

        {/* 탭 */}
        <div style={{borderBottom:"1px solid #1e3a5f",marginBottom:24}}>
          {[["calc","원가 계산"],["items","자재 단가 수정"],["labor","인건비 수정"]].map(([key,label])=>(
            <button key={key} className={`tab-btn${activeTab===key?" active":""}`} onClick={()=>setActiveTab(key)}>{label}</button>
          ))}
        </div>

        {loading ? (
          <div style={{color:"#334155",fontSize:13,padding:"60px 0",textAlign:"center"}}>데이터 로딩 중...</div>
        ) : activeTab==="calc" ? (
          <>
            {/* 자재 카테고리별 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:20}}>
              {Object.entries(byCategory).map(([cat,items])=>{
                const sub = items.reduce((s,r)=>s+r.qty*r.unit_price,0);
                return (
                  <div key={cat} style={{background:"#0d1729",border:`1px solid ${CAT_COLORS[cat]}22`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{background:`${CAT_COLORS[cat]}15`,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:12,color:CAT_COLORS[cat],fontWeight:600}}>{CAT_LABELS[cat]}</span>
                      <span style={{fontSize:13,color:CAT_COLORS[cat]}}>₩{fmt(sub)}</span>
                    </div>
                    <table>
                      <thead>
                        <tr style={{borderBottom:"1px solid #1e3a5f"}}>
                          <th style={{textAlign:"left"}}>품목</th>
                          <th style={{textAlign:"right",width:60}}>수량</th>
                          <th style={{textAlign:"right",width:80}}>단가</th>
                          <th style={{textAlign:"right",width:90}}>합계</th>
                        </tr>
                      </thead>
                      <tbody>
                        {items.filter(r=>r.qty>0).map(row=>(
                          <tr key={row.id} className="row-hover">
                            <td>{row.name}</td>
                            <td style={{textAlign:"right"}}>
                              <input type="number" value={row.qty} style={{width:50}} onChange={e=>updateQty(row.id,e.target.value)}/>
                            </td>
                            <td style={{textAlign:"right",color:"#64748b"}}>{fmt(row.unit_price)}</td>
                            <td style={{textAlign:"right",color:"#e2e8f0"}}>{fmt(row.qty*row.unit_price)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                );
              })}
            </div>

            {/* 인건비 박스 */}
            <div style={{background:"#0d1729",border:"1px solid #1e3a5f",borderRadius:8,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid #1e3a5f",fontSize:12,color:"#64748b",letterSpacing:1}}>인건비 — {size}</div>
              <div style={{display:"flex"}}>
                {["철골","내장","페인트"].map(cat=>{
                  const l = laborRows.find(r=>r.category===cat);
                  return (
                    <div key={cat} style={{flex:1,padding:"16px 20px",borderRight:"1px solid #1e3a5f"}}>
                      <div style={{fontSize:11,color:LABOR_COLORS[cat],marginBottom:6}}>{cat} 인건비</div>
                      <div style={{fontSize:20,color:"#f1f5f9",fontWeight:600}}>₩{l?fmt(l.base_cost):"-"}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 총계 */}
            <div style={{background:"#0d1729",border:"1px solid #f9731633",borderRadius:8,padding:"20px 28px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto 1fr",gap:0,alignItems:"center"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#475569",marginBottom:6}}>자재 합계</div>
                  <div style={{fontSize:18,color:"#e2e8f0"}}>₩{fmt(matTotal)}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#475569",marginBottom:6}}>인건비 합계</div>
                  <div style={{fontSize:18,color:"#e2e8f0"}}>₩{fmt(laborTotal)}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#475569",marginBottom:6}}>페인트 자재</div>
                  <div style={{fontSize:18,color:"#e2e8f0"}}>₩{fmt(rows.filter(r=>r.category==="paint_material").reduce((s,r)=>s+r.qty*r.unit_price,0))}</div>
                </div>
                <div style={{background:"#1e3a5f",width:2,height:48,margin:"0 24px"}}/>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#f97316",marginBottom:6,letterSpacing:2}}>총 원가</div>
                  <div style={{fontSize:30,color:"#f97316",fontWeight:600}}>₩{fmt(grandTotal)}</div>
                </div>
              </div>
            </div>
          </>
        ) : activeTab==="items" ? (
          <div style={{background:"#0d1729",borderRadius:8,overflow:"hidden",border:"1px solid #1e3a5f"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid #1e3a5f",fontSize:11,color:"#475569",letterSpacing:2}}>
              단가 수정 후 Enter → 자동 저장 (모든 규격 즉시 반영)
            </div>
            <table>
              <thead>
                <tr style={{borderBottom:"1px solid #1e3a5f"}}>
                  <th style={{textAlign:"left",width:110}}>카테고리</th>
                  <th style={{textAlign:"left"}}>품목</th>
                  <th style={{textAlign:"center",width:50}}>단위</th>
                  <th style={{textAlign:"right",width:150}}>단가 (원)</th>
                </tr>
              </thead>
              <tbody>
                {allItems.map(item=>(
                  <tr key={item.id} className="row-hover">
                    <td>
                      <span style={{fontSize:11,color:CAT_COLORS[item.category],background:`${CAT_COLORS[item.category]}15`,padding:"2px 8px",borderRadius:3}}>
                        {CAT_LABELS[item.category]}
                      </span>
                    </td>
                    <td>{item.name}</td>
                    <td style={{textAlign:"center",color:"#475569"}}>{item.unit}</td>
                    <td style={{textAlign:"right"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:6}}>
                        {savedId===item.id && <span style={{fontSize:10,color:"#22d3ee"}}>✓</span>}
                        <input type="number" defaultValue={item.unit_price} style={{width:120}}
                          onBlur={e=>updatePrice(item.id,e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&e.target.blur()}/>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : (
          <div style={{background:"#0d1729",borderRadius:8,overflow:"hidden",border:"1px solid #1e3a5f"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid #1e3a5f",fontSize:11,color:"#475569",letterSpacing:2}}>
              인건비 수정 후 Enter → 자동 저장
            </div>
            <table>
              <thead>
                <tr style={{borderBottom:"1px solid #1e3a5f"}}>
                  <th style={{textAlign:"left",width:100}}>카테고리</th>
                  <th style={{textAlign:"left"}}>규격</th>
                  <th style={{textAlign:"right",width:160}}>인건비 (원)</th>
                </tr>
              </thead>
              <tbody>
                {allLabor.map(l=>(
                  <tr key={l.id} className="row-hover">
                    <td>
                      <span style={{fontSize:11,color:LABOR_COLORS[l.category],background:`${LABOR_COLORS[l.category]}15`,padding:"2px 8px",borderRadius:3}}>
                        {l.category}
                      </span>
                    </td>
                    <td>{l.container_size}</td>
                    <td style={{textAlign:"right"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:6}}>
                        {savedId==="labor_"+l.id && <span style={{fontSize:10,color:"#22d3ee"}}>✓</span>}
                        <input type="number" defaultValue={l.base_cost} style={{width:130}}
                          onBlur={e=>updateLabor(l.id,e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&e.target.blur()}/>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
